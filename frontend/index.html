<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto & Gold Smart Manager</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="auth-container" class="container">
        <div class="card">
            <h2 id="auth-title">Login</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" id="auth-btn">Login</button>
            </form>
            <p id="toggle-auth">Don't have an account? <span>Sign Up</span></p>
        </div>
    </div>

    <div id="dashboard-container" class="container hidden">
        <header>
            <h1><i class="fas fa-chart-line"></i> Smart Manager</h1>
            <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </header>

        <div class="grid">
            <div class="card price-card">
                <h3>Live Prices (Binance)</h3>
                <div id="prices-list">
                    <p>Loading prices...</p>
                </div>
            </div>

            <div class="card">
                <h3>Add New Transaction</h3>
                <form id="transaction-form">
                    <select id="asset_type" required>
                        <option value="crypto">Crypto</option>
                        <option value="gold">Gold</option>
                    </select>
                    <input type="text" id="asset_name" placeholder="Symbol (e.g. BTC, XAU)" required>
                    <input type="number" step="any" id="amount" placeholder="Amount" required>
                    <input type="number" step="any" id="purchase_price" placeholder="Purchase Price (USD)" required>
                    <textarea id="notes" placeholder="Notes (Optional)"></textarea>
                    <button type="submit">Add Asset</button>
                </form>
            </div>
        </div>

        <div class="card">
            <h3>My Portfolio</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Asset</th>
                            <th>Amount</th>
                            <th>Price (Buy)</th>
                            <th>Notes</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-list">
                        <!-- Transactions will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="static/app.js"></script>
</body>
</html>
